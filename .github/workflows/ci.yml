name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (eslint + knip + depcruise)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # knip and depcruise both span web/, so resolving web imports needs its deps installed too.
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm run lint
      - run: npm run deadcode
      - run: npm run depcruise

  daemon:
    name: Daemon (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # tests/tmux/driver.test.ts shells out to tmux; tests/plugins/filesPdf.test.ts shells out to
      # poppler (pdftotext/pdftoppm/pdfinfo) to read real PDFs.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux poppler-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:cli-tmux:built

  web:
    name: Web (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
