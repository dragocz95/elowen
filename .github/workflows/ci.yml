name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (eslint + knip + depcruise)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # knip and depcruise both span web/, so resolving web imports needs its deps installed too.
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm run lint
      - run: npm run deadcode
      - run: npm run depcruise
      # cs/en dictionary parity + plugin i18n coverage (also runs as part of every build via prebuild).
      - run: npm run languages-check

  daemon:
    name: Daemon (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # tests/tmux/driver.test.ts shells out to tmux; tests/plugins/filesPdf.test.ts shells out to
      # poppler (pdftotext/pdftoppm/pdfinfo) to read real PDFs; tests/plugins/filesPlugin.test.ts
      # shells out to ripgrep (rg) for the Grep tool.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux poppler-utils ripgrep

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:cli-tmux:built

  brain-e2e:
    name: Brain E2E (real daemon)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Boots the ACTUAL built daemon on a throwaway port + temp DB, points its brain at a scripted
      # OpenAI-compatible model server, and drives a real chat turn over HTTP+SSE (auth → start → stream →
      # send → tool call → idle → persisted transcript), plus a teeth check that a provider error surfaces.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/brain-e2e/chat-turn.mjs

  telegram-e2e:
    name: Telegram E2E (real daemon + fake Bot API)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Boots the ACTUAL built daemon on a throwaway port, enables the REAL telegram plugin pointed at a
      # fake Telegram Bot API server (via the adapter's `apiRoot` seam), and drives a private message + the
      # shared control commands (/status, /new, /fast) end to end, asserting the bot's captured replies are
      # Telegram plain text. Plus a teeth check that a provider error surfaces as the bot's "⚠️" reply.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/telegram-e2e/telegram-roundtrip.mjs

  discord-e2e:
    name: Discord E2E (real daemon + fake Discord API)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Boots the ACTUAL built daemon, enables the REAL discord plugin pointed at a fake Discord REST +
      # gateway server (via the adapter's `apiBase`/`gatewayUrl` seam), and drives a message + the shared
      # control commands (/status, /new, /fast) as slash interactions end to end, asserting the bot's
      # captured replies use Discord formatting (markdown bold, ephemeral interaction callbacks, message
      # references). Plus a teeth check that a provider error surfaces as the bot's "⚠️" reply.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/discord-e2e/discord-roundtrip.mjs

  msteams-e2e:
    name: Teams E2E (real daemon + fake Bot Framework)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Boots the ACTUAL built daemon, enables the REAL msteams plugin pointed at a fake Bot Framework
      # (token endpoint + JWKS + Connector REST, via the adapter's `oauthTokenUrl`/`openIdMetadataUrl`
      # seams), and drives a signed activity through the daemon's /hooks webhook end to end: async
      # Connector reply, live-trace PUT edits and /status via the shared control core. Plus teeth checks
      # that a forged JWT bounces with 401 and a provider error surfaces as the bot's "⚠️" reply.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/msteams-e2e/msteams-roundtrip.mjs

  cron-e2e:
    name: Cron E2E (real daemon + scheduled collector)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Boots the ACTUAL built daemon, enables the cronjob plugin, registers a one-shot job whose `check`
      # collector emits a marker, shortens the tick, and asserts the collector output reaches the brain
      # under the "Check output" framing, persists as the cron channel session, and the one-shot job is
      # consumed. Teeth: an empty collector skips the turn and the poll times out.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/cron-e2e/run.mjs

  api-e2e:
    name: API E2E (REST/SSE/WS contract)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Boots the ACTUAL built daemon and asserts the auth guard matrix (public routes, setup-mode open,
      # bearer-required after first admin), the SSE stream lifecycle (unauthed reject, authed frames → idle,
      # clean client disconnect), and the WebSocket terminal channel (single-use ws-ticket gate). Teeth:
      # flipping a re-engaged 401 expectation to 200 fails the run.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/api-e2e/run.mjs

  migration-e2e:
    name: Migration E2E (old-schema DB upgrade)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Builds an old-schema (user_version 0) SQLite fixture with representative rows, boots the ACTUAL
      # daemon against it, and asserts the migration runner advances the version, upgrades the data
      # (tool-rename maps, prompt-key renames), preserves the pre-existing admin/sessions, and does not
      # re-trigger setup. Teeth: asserting a pre-migration value fails the run.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/migration-e2e/run.mjs

  web-e2e:
    name: Web E2E (Next standalone + BFF proxy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Builds both dist/ and the Next standalone (web-dist/), boots the ACTUAL daemon + web server on
      # throwaway ports, and asserts the key app routes serve 200 and the BFF proxy contract (setup-mode
      # tokenless passthrough, first admin via proxy, cookie→Bearer injection, Authorization not forwardable,
      # 401 clears the cookie only when a token was present). Teeth: a dead upstream / broken route fails.
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm run build
      - run: npm run build:web
      - run: node scripts/tests/web-e2e/run.mjs

  whatsapp-e2e:
    name: WhatsApp E2E (real daemon + fake baileys socket)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Boots the ACTUAL built daemon, enables the REAL whatsapp plugin with its baileys socket swapped for a
      # fake connected socket (via the adapter's WHATSAPP_E2E_SOCKET_MODULE seam — baileys' encrypted
      # Noise/Signal wire can't be faked), injects an inbound message and drives the shared control commands,
      # asserting the captured sends use WhatsApp formatting. Teeth: a provider error surfaces as the reply.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/whatsapp-e2e/whatsapp-roundtrip.mjs

  delegate-e2e:
    name: Delegate E2E (sub-agent + workflow)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # The real daemon boots RealTmuxDriver and runs startup sweeps that shell out to tmux; install it so
      # those best-effort calls don't spew errors during boot.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Boots the ACTUAL built daemon and drives a scripted parent turn that emits a Delegate tool call (and a
      # WorkflowStart DAG), asserting the child sub-agent really spawns with the right task, runs its own turn,
      # and its result returns to the parent. Teeth: a non-spawning tool fails the run.
      - run: npm ci
      - run: npm run build
      - run: node scripts/tests/delegate-e2e/run.mjs

  web:
    name: Web (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  install-smoke:
    name: Install smoke (packed tarball in Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Packs the real tarball, installs it in a clean node:22 container and asserts the fresh-install
      # unbox flow (elowen up -> setup-mode API -> first admin -> web serves -> elowen down). Catches
      # packaging/first-run bugs — missing `files`, unbuilt dist/web-dist, mis-pinned deps — that the
      # source-tree jobs above never see. Its in-image `npm install` hits the public registry, so a
      # registry outage (or a genuinely broken fresh install) is what turns this red.
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm run test:install

  macos-smoke:
    name: macOS smoke (packed tarball, native launcher)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # The same unboxing contract as install-smoke, but natively on macOS (no Docker on these
      # runners): pack the tarball, install it globally on the clean runner and drive the launcher
      # path (`elowen up` -> setup-mode API -> first admin -> web serves -> `elowen down`) — the exact
      # flow a Mac user hits after `npm install -g elowen`. Also proves the native deps
      # (better-sqlite3, node-pty) resolve on darwin-arm64. tmux mirrors the Linux image's baseline.
      - run: brew install tmux
      - run: npm ci
      - run: npm ci --prefix web
      - run: npm run test:install -- --native
